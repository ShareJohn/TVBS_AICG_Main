<head>

    <title>Professional News CG Generator - PS Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Oswald:wght@400;700&family=Roboto:wght@400;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #1a1a1a;
            color: #ccc;
            margin: 0;
            overflow: hidden;
        }
        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #2a2a2a;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 0px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
        /* Stable Selection Box for html2canvas */
        .marquee-box {
            border: 1px dashed rgba(255, 255, 255, 0.8);
            outline: 1px dashed rgba(0, 0, 0, 0.8);
            pointer-events: none;
        }
        img { -webkit-user-drag: none; }
        input[type="range"] { -webkit-appearance: none; background: transparent; }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 14px; width: 14px; border-radius: 50%;
            background: #3b82f6; cursor: pointer; border: 2px solid white;
            margin-top: -5px;
        }
        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%; height: 4px; cursor: pointer;
            background: #111; border-radius: 2px;
        }
    </style>
